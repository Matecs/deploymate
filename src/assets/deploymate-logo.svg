<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" fill="none" role="img" aria-label="DeployMate">
  <!-- Icon: precision crosshair + checkmark -->
  <g transform="translate(20 10)" stroke="#0A1F44" stroke-linecap="butt">
    <!-- Crosshair hairlines extending beyond the circle -->
    <line x1="50" y1="-8"  x2="50" y2="30"  stroke-width="1"/>
    <line x1="50" y1="70"  x2="50" y2="108" stroke-width="1"/>
    <line x1="-8" y1="50"  x2="30" y2="50"  stroke-width="1"/>
    <line x1="70" y1="50"  x2="108" y2="50" stroke-width="1"/>
    <!-- Outer circle, single thin stroke -->
    <circle cx="50" cy="50" r="42" stroke-width="1.5"/>
    <!-- Tick marks on circle -->
    <line x1="50" y1="12" x2="50" y2="20" stroke-width="1.5"/>
    <line x1="50" y1="80" x2="50" y2="88" stroke-width="1.5"/>
    <line x1="12" y1="50" x2="20" y2="50" stroke-width="1.5"/>
    <line x1="80" y1="50" x2="88" y2="50" stroke-width="1.5"/>
    <!-- Checkmark: bold, confident -->
    <polyline points="30,50 46,66 72,34" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" fill="none"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(150 78)" fill="#0A1F44" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace" letter-spacing="1.5">
    <text font-size="44" font-weight="700">Deploy<tspan font-weight="400">Mate</tspan></text>
  </g>
</svg>
